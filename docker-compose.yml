version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kimito-postgres-dev
    environment:
      POSTGRES_USER: kimito_user
      POSTGRES_PASSWORD: kimito_password
      POSTGRES_DB: kimito_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
